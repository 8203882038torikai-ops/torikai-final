<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>院内紹介｜とりかい眼科</title>
  <meta name="description" content="とりかい眼科の院内紹介ページです。">
  <style>
    :root {
      --bg: #f5f5f5;
      --card: #ffffff;
      --line: #dddddd;
      --text: #2a2a2a;
      --subtle: #707070;
      --placeholder: #d0d0d0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 56px 20px 72px;
    }
    .hero {
      text-align: center;
      margin-bottom: 40px;
    }
    .hero h1 {
      font-size: clamp(28px, 4vw, 40px);
      letter-spacing: 0.04em;
      margin-bottom: 12px;
    }
    .hero p {
      color: var(--subtle);
      font-size: 15px;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 22px;
    }
    @media (max-width: 900px) {
      .gallery { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 560px) {
      .gallery { grid-template-columns: 1fr; }
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
    }
    .placeholder {
      width: 100%;
      aspect-ratio: 4 / 3;
      background: var(--placeholder);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8a8a8a;
      font-size: 13px;
      letter-spacing: 0.08em;
    }
    .room-name {
      padding: 16px 14px 18px;
      text-align: center;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="hero">
      <h1>院内紹介</h1>
      <p>写真は準備でき次第、順次追加予定です。</p>
    </section>
    <section class="gallery" aria-label="院内ギャラリー">
      <article class="card"><div class="placeholder">PHOTO PLACEHOLDER</div><h2 class="room-name">受付</h2></article>
      <article class="card"><div class="placeholder">PHOTO PLACEHOLDER</div><h2 class="room-name">待合室</h2></article>
      <article class="card"><div class="placeholder">PHOTO PLACEHOLDER</div><h2 class="room-name">検査室</h2></article>
      <article class="card"><div class="placeholder">PHOTO PLACEHOLDER</div><h2 class="room-name">診察室</h2></article>
      <article class="card"><div class="placeholder">PHOTO PLACEHOLDER</div><h2 class="room-name">手術室</h2></article>
    </section>
  </main>
</body>
</html>
